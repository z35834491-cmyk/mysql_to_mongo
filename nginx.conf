# Nginx Configuration for Shark Platform

# Upstream Django server (Gunicorn running on localhost:8001)
upstream django_app {
    server 127.0.0.1:8001;
}

server {
    listen 8000;
    server_name _;

    # Frontend Root
    root /app/frontend/dist;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 1. API & Admin Proxy (match /admin and /admin/ so Django admin works)
    location ~ ^/(api|admin|auth)(/|$) {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Django Static Files (e.g. Admin interface styles)
    # Note: frontend assets are in /app/frontend/dist/assets, served by root /
    # Django collects static files to /app/staticfiles
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 3. Frontend Assets
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 4. SPA Catch-all
    # Any request not matching api/admin/static/assets serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
