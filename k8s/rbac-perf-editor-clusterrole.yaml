apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: perf-editor-cluster
rules:
- apiGroups: ["apps"]
  resources: ["daemonsets"]
  verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: perf-editor-cluster-binding
subjects:
- kind: ServiceAccount
  name: perf-reader
  namespace: default
roleRef:
  kind: ClusterRole
  name: perf-editor-cluster
  apiGroup: rbac.authorization.k8s.io
