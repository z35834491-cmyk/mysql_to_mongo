apiVersion: v1
kind: Namespace
metadata:
  name: trace-system
---
# 1. Tempo (轻量级 Trace 存储与查询 API)
# 作用：接收 Beyla 发来的 Trace，并提供 HTTP API 给 Django 查询
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: trace-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempo
  template:
    metadata:
      labels:
        app: tempo
    spec:
      containers:
      - name: tempo
        image: grafana/tempo:latest
        args:
          - "-config.file=/etc/tempo.yaml"
        ports:
          - containerPort: 3200  # HTTP Query API (给 Django 用)
          - containerPort: 4317  # OTLP gRPC Receiver (给 Beyla 用)
          - containerPort: 4318  # OTLP HTTP Receiver
        volumeMounts:
          - mountPath: /etc/tempo.yaml
            name: tempo-config
            subPath: tempo.yaml
      volumes:
        - name: tempo-config
          configMap:
            name: tempo-config
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: trace-system
spec:
  selector:
    app: tempo
  ports:
    - protocol: TCP
      port: 3200
      targetPort: 3200
      name: http-query
    - protocol: TCP
      port: 4317
      targetPort: 4317
      name: otlp-grpc
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: trace-system
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
    multitenancy_enabled: false
    search_enabled: true
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "0.0.0.0:4317"
            http:
              endpoint: "0.0.0.0:4318"
    ingester:
      trace_idle_period: 10s
      max_block_bytes: 1_000_000
      max_block_duration: 5m
    storage:
      trace:
        backend: local
        local:
          path: /tmp/tempo/blocks
        wal:
          path: /tmp/tempo/wal
    memberlist:
      bind_addr: "0.0.0.0"
      bind_port: 7946
      join_members: []
