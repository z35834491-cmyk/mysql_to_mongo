apiVersion: apps/v1
kind: Deployment
metadata:
  name: shark-platform
  namespace: default
  labels:
    app: shark-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shark-platform
  template:
    metadata:
      labels:
        app: shark-platform
    spec:
      containers:
      - name: shark-platform
        image: shark-platform:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: shark-platform-config
        - secretRef:
            name: shark-platform-secrets
        env:
        - name: MYSQL_HOST
          value: "mysql-service"
        - name: MONGO_HOST
          value: "mongo-service"
        volumeMounts:
        - name: app-state
          mountPath: /app/state
        - name: app-logs
          mountPath: /app/logs
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/system/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/system/health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: app-state
        persistentVolumeClaim:
          claimName: shark-platform-pvc
      - name: app-logs
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: shark-platform-service
  namespace: default
spec:
  selector:
    app: shark-platform
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: NodePort
