# 在 ClickHouse 就绪后创建 traffic 库与 traffic_minute_rollup 表（执行一次即可，可重复 apply 幂等）
# 依赖：clickhouse-traffic.yaml 已 apply，Secret clickhouse-traffic-auth 已创建
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-traffic-ddl
  namespace: middleware-system
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS traffic;
    CREATE TABLE IF NOT EXISTS traffic.traffic_minute_rollup
    (
        bucket_start DateTime,
        source_id String,
        requests UInt64,
        sum_latency_ms UInt64,
        count_latency UInt32,
        status_2xx UInt32,
        status_4xx UInt32,
        status_5xx UInt32,
        p50_ms Nullable(Float64),
        p95_ms Nullable(Float64),
        p99_ms Nullable(Float64),
        geo_counts String,
        top_paths String,
        ver DateTime
    )
    ENGINE = ReplacingMergeTree(ver)
    ORDER BY (source_id, bucket_start);
---
apiVersion: batch/v1
kind: Job
metadata:
  name: clickhouse-traffic-init
  namespace: middleware-system
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: clickhouse/clickhouse-server:24.8-alpine
          env:
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-traffic-auth
                  key: password
          volumeMounts:
            - name: ddl
              mountPath: /ddl
          command:
            - /bin/sh
            - -c
            - |
              set -e
              for i in $(seq 1 90); do
                if clickhouse-client -h clickhouse --port 9000 -u shark --password "$CLICKHOUSE_PASSWORD" -q 'SELECT 1' 2>/dev/null; then
                  break
                fi
                echo "waiting clickhouse..."
                sleep 2
              done
              clickhouse-client -h clickhouse --port 9000 -u shark --password "$CLICKHOUSE_PASSWORD" --multiquery < /ddl/init.sql
              echo "DDL ok."
      volumes:
        - name: ddl
          configMap:
            name: clickhouse-traffic-ddl
