# 若尚未部署 traffic-redis，可使用本清单（namespace: middleware-system）
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-redis
  namespace: middleware-system
  labels:
    app: traffic-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic-redis
  template:
    metadata:
      labels:
        app: traffic-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: traffic-redis
  namespace: middleware-system
spec:
  selector:
    app: traffic-redis
  ports:
    - port: 6379
      targetPort: 6379
