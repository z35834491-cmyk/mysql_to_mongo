# ClickHouse 单实例 + PVC（middleware-system），供 Traffic 分钟聚合长期留存。
# Shark 使用 Service 名：clickhouse.middleware-system.svc.cluster.local
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: clickhouse-traffic-data
  namespace: middleware-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: middleware-system
  labels:
    app: clickhouse-traffic
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: native
      port: 9000
      targetPort: 9000
  selector:
    app: clickhouse-traffic
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickhouse-traffic
  namespace: middleware-system
  labels:
    app: clickhouse-traffic
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: clickhouse-traffic
  template:
    metadata:
      labels:
        app: clickhouse-traffic
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.8-alpine
          ports:
            - containerPort: 8123
              name: http
            - containerPort: 9000
              name: native
          env:
            - name: CLICKHOUSE_DB
              value: traffic
            - name: CLICKHOUSE_USER
              value: shark
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-traffic-auth
                  key: password
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2"
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: clickhouse-traffic-data
