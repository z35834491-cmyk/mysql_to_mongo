# 首次将 GeoLite2-City.mmdb 写入 PVC（经 jsDelivr npm 镜像，无需 MaxMind 密钥）
# 合规提示：第三方镜像可能滞后或违反 MaxMind 再分发条款，生产请自行评估；官方源见 README §13。
# kubectl apply -f maxmind-geolite2-download-job.yaml
---
apiVersion: batch/v1
kind: Job
metadata:
  name: maxmind-geolite2-city-initial
  namespace: middleware-system
  labels:
    app: maxmind-geolite2
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: maxmind-geolite2
    spec:
      restartPolicy: OnFailure
      containers:
        - name: download
          image: alpine:3.19
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              apk add --no-cache curl gzip >/dev/null
              mkdir -p /data /tmp/maxmind
              cd /tmp/maxmind
              echo "Downloading GeoLite2-City mirror (no key needed)..."
              curl -sSL -f -L --connect-timeout 30 --max-time 600 \
                -o GeoLite2-City.mmdb.gz \
                "https://cdn.jsdelivr.net/npm/geolite2-city/GeoLite2-City.mmdb.gz"
              gunzip -f GeoLite2-City.mmdb.gz
              cp -f GeoLite2-City.mmdb /data/GeoLite2-City.mmdb
              chmod 644 /data/GeoLite2-City.mmdb
              ls -la /data/GeoLite2-City.mmdb
              echo "Done."
          volumeMounts:
            - name: geoip-data
              mountPath: /data
      volumes:
        - name: geoip-data
          persistentVolumeClaim:
            claimName: geoip-maxmind-pvc
