# PVC：存放 GeoLite2-City.mmdb，供 CronJob 写入、shark-platform 只读挂载
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: geoip-maxmind-pvc
  namespace: middleware-system
  labels:
    app: maxmind-geolite2
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 512Mi
  # storageClassName: your-sc-name   # 按集群 StorageClass 取消注释并填写
