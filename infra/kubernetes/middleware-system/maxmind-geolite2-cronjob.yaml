# 定期从 jsDelivr 镜像更新 GeoLite2-City.mmdb（无需 MaxMind Secret）
# 合规提示：见 maxmind-geolite2-download-job.yaml 文件头说明
apiVersion: batch/v1
kind: CronJob
metadata:
  name: maxmind-geolite2-city-download
  namespace: middleware-system
  labels:
    app: maxmind-geolite2
spec:
  schedule: "0 4 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: maxmind-geolite2
        spec:
          restartPolicy: OnFailure
          containers:
            - name: download
              image: alpine:3.19
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -euo pipefail
                  apk add --no-cache curl gzip >/dev/null
                  mkdir -p /data /tmp/maxmind
                  cd /tmp/maxmind
                  echo "Downloading GeoLite2-City mirror (no key needed)..."
                  curl -sSL -f -L --connect-timeout 30 --max-time 600 \
                    -o GeoLite2-City.mmdb.gz \
                    "https://cdn.jsdelivr.net/npm/geolite2-city/GeoLite2-City.mmdb.gz"
                  gunzip -f GeoLite2-City.mmdb.gz
                  cp -f GeoLite2-City.mmdb /data/GeoLite2-City.mmdb
                  chmod 644 /data/GeoLite2-City.mmdb
                  ls -la /data/GeoLite2-City.mmdb
                  echo "Cron download done."
              volumeMounts:
                - name: geoip-data
                  mountPath: /data
          volumes:
            - name: geoip-data
              persistentVolumeClaim:
                claimName: geoip-maxmind-pvc
