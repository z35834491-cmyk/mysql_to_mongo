# 合并进 shark-platform Deployment 的 env 片段（与 geoip-traffic-patch 同级参考）
# 推荐用 README-CLICKHOUSE-TRAFFIC.md 里的 kubectl set env / patch，避免手工合并整份 Deployment。
#
# 以下为 strategic merge 参考：在 containers[0].env 末尾追加：
---
# 示例（勿直接 apply 本文件，仅作文档）；实际请用 kubectl set env 命令。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shark-platform
  namespace: middleware-system
spec:
  template:
    spec:
      containers:
        - name: shark-platform
          env:
            - name: CLICKHOUSE_HOST
              value: "clickhouse.middleware-system.svc.cluster.local"
            - name: CLICKHOUSE_PORT
              value: "8123"
            - name: CLICKHOUSE_USER
              value: "shark"
            - name: CLICKHOUSE_DATABASE
              value: "traffic"
            - name: CLICKHOUSE_ROLLUP_TABLE
              value: "traffic_minute_rollup"
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-traffic-auth
                  key: password
