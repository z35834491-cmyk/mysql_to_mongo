# 示例：勿提交真实密钥。请复制为本地文件后替换占位符再 apply，或直接用 kubectl create（推荐）
#
# kubectl -n middleware-system create secret generic maxmind-credentials \
#   --from-literal=account_id='你的AccountID' \
#   --from-literal=license_key='你的LicenseKey' \
#   --dry-run=client -o yaml | kubectl apply -f -
#
apiVersion: v1
kind: Secret
metadata:
  name: maxmind-credentials
  namespace: middleware-system
type: Opaque
stringData:
  account_id: "REPLACE_WITH_MAXMIND_ACCOUNT_ID"
  license_key: "REPLACE_WITH_MAXMIND_LICENSE_KEY"
