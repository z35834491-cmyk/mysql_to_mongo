# 将 geoip PVC 挂到 shark-platform，并配置 Traffic 所需环境变量（Redis + GeoIP 路径 + ingest token）
# 用法：请合并进现有 Deployment，或 kubectl patch / kustomize strategic merge。
# 下面为「片段」：需并入 spec.template.spec 的 containers[0] 与 volumes。
#
# Redis：假定 traffic-redis Service 在同一 namespace middleware-system，逻辑库 2
# Ingest：假定 Secret traffic-ingest 的 key 为 token（与文档一致）
---
# 参考：用 kubectl patch 时，请按实际容器名修改（常见 shark-platform / shark / web）
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shark-platform
  namespace: middleware-system
spec:
  template:
    spec:
      volumes:
        - name: geoip-maxmind
          persistentVolumeClaim:
            claimName: geoip-maxmind-pvc
      containers:
        - name: shark-platform
          volumeMounts:
            - name: geoip-maxmind
              mountPath: /data/geoip
              readOnly: true
          env:
            - name: TRAFFIC_REDIS_URL
              value: "redis://traffic-redis.middleware-system.svc.cluster.local:6379/2"
            - name: TRAFFIC_GEOIP_DB
              value: "/data/geoip/GeoLite2-City.mmdb"
            - name: TRAFFIC_INGEST_TOKEN
              valueFrom:
                secretKeyRef:
                  name: traffic-ingest
                  key: token
