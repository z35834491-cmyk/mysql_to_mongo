# 仅在「启用 profile sync」时使用，让 syncer_app 等待 MySQL 与 Mongo 副本集就绪。
# 勿单独使用本文件；勿在未加 --profile sync 时合并，否则会因缺少 mysql/mongo 服务而报错。
#
#   docker compose -f infra/docker/docker-compose.yml -f infra/docker/docker-compose.sync-depends.yml --profile sync up -d --build
#
version: "3.9"

services:
  syncer_app:
    depends_on:
      mysql_source:
        condition: service_healthy
      mongo_rs_init:
        condition: service_completed_successfully
