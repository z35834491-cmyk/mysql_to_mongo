# Shark Platform 本地编排
#
# 默认（仅 Web + SQLite 状态库，不测数据同步）：
#   docker compose -f infra/docker/docker-compose.yml up -d --build
#
# 需要 MySQL / Mongo 副本集 / Redis / RabbitMQ 做同步或中间件联调时加 profile sync：
#   docker compose -f infra/docker/docker-compose.yml --profile sync up -d --build
#
# 若希望应用等 MySQL 健康、Mongo 初始化完成后再启动，可同时带上依赖覆盖文件：
#   docker compose -f infra/docker/docker-compose.yml -f infra/docker/docker-compose.sync-depends.yml --profile sync up -d --build
#
# 也可在仓库根目录 .env 中设置：COMPOSE_PROFILES=sync
#
version: "3.9"

services:
  mysql_source:
    profiles: ["sync"]
    image: mysql:8.0
    container_name: mysql_source
    ports:
      - "3317:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: testdb
    volumes:
      - ./mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      timeout: 20s
      retries: 10
    restart: unless-stopped

  mongo1:
    profiles: ["sync"]
    depends_on:
      mongo_key_init:
        condition: service_completed_successfully
    image: mongo:latest
    container_name: mongo1
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    volumes:
      - mongo1_data:/data/db
      - mongo_keyfile:/etc/mongo_key:ro
    command: >
      bash -c "exec mongod --replSet rs0 --bind_ip_all --keyFile /etc/mongo_key/mongo-keyfile"
    restart: unless-stopped

  mongo2:
    profiles: ["sync"]
    depends_on:
      mongo_key_init:
        condition: service_completed_successfully
    image: mongo:latest
    container_name: mongo2
    ports:
      - "27019:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    volumes:
      - mongo2_data:/data/db
      - mongo_keyfile:/etc/mongo_key:ro
    command: >
      bash -c "exec mongod --replSet rs0 --bind_ip_all --keyFile /etc/mongo_key/mongo-keyfile"
    restart: unless-stopped

  mongo3:
    profiles: ["sync"]
    depends_on:
      mongo_key_init:
        condition: service_completed_successfully
    image: mongo:latest
    container_name: mongo3
    ports:
      - "27020:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    volumes:
      - mongo3_data:/data/db
      - mongo_keyfile:/etc/mongo_key:ro
    command: >
      bash -c "exec mongod --replSet rs0 --bind_ip_all --keyFile /etc/mongo_key/mongo-keyfile"
    restart: unless-stopped

  mongo_rs_init:
    profiles: ["sync"]
    image: mongo:latest
    depends_on:
      - mongo1
      - mongo2
      - mongo3
    entrypoint: >
      bash -ec "
        echo 'Waiting for mongo1...';
        until mongosh --host mongo1:27017 -u root -p root --authenticationDatabase admin --eval 'db.runCommand({ ping: 1 })' >/dev/null 2>&1; do
          sleep 2;
        done
        echo 'Initiating replica set...';
        mongosh --host mongo1:27017 -u root -p root --authenticationDatabase admin --eval '
          try {
            rs.status();
            print(\"Replica set already initialized\");
          } catch (e) {
            rs.initiate({
              _id: \"rs0\",
              members: [
                { _id: 0, host: \"mongo1:27017\" },
                { _id: 1, host: \"mongo2:27017\" },
                { _id: 2, host: \"mongo3:27017\" }
              ]
            });
            printjson(rs.status());
          }
        '
        echo 'Replica set init done.'
      "
    restart: "no"

  mongo_key_init:
    profiles: ["sync"]
    image: alpine:3.19
    entrypoint: >
      sh -c "
        if [ ! -f /key/mongo-keyfile ]; then
          dd if=/dev/urandom bs=741 count=1 2>/dev/null | base64 > /key/mongo-keyfile;
          chmod 400 /key/mongo-keyfile;
        fi
      "
    volumes:
      - mongo_keyfile:/key
    restart: "no"

  redis:
    profiles: ["sync"]
    image: redis:latest
    container_name: redis_test
    ports:
      - "6379:6379"
    command: redis-server --requirepass root --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

  rabbitmq:
    profiles: ["sync"]
    image: rabbitmq:3-management
    container_name: rabbitmq_test
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: root
      RABBITMQ_DEFAULT_PASS: root
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

  syncer_app:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: syncer_app
    ports:
      - "8000:8000"
    volumes:
      - ../../state:/app/state
      - ../../logs:/app/logs
    environment:
      - DEBUG=False
      - ALLOWED_HOSTS=*
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

volumes:
  mysql_data:
  mongo1_data:
  mongo2_data:
  mongo3_data:
  mongo_keyfile:
  redis_data:
  rabbitmq_data:
